<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FP Scout — Date View</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b0f;--surface:#0f1318;--surface2:#161c24;
  --border:#1c2330;--border2:#243040;
  --accent:#00e5ff;--green:#00e676;--yellow:#ffe600;--orange:#ff6d00;--red:#ff1744;
  --muted:#3d4a5c;--text:#c8d4e8;--text-dim:#5a6a80;
  --font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
  --low:#00e676;--mid:#ffe600;--high:#ff9100;--xhigh:#ff6090;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:.4}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:100;background:rgba(8,11,15,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);padding:0 20px;height:58px;display:flex;align-items:center;gap:14px}
.back{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:var(--text-dim);text-decoration:none;transition:color .15s}
.back::before{content:'‹';font-size:18px;line-height:1}
.back:hover{color:var(--accent)}
.logo{font-size:18px;font-weight:800;letter-spacing:.06em;color:#fff;margin-left:auto}
.logo span{color:var(--accent)}

/* ── STATUS ── */
#status-bar{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;
  color:var(--muted);padding:14px 20px 0;min-height:36px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;
  animation:blink 1.3s ease-in-out infinite}
.dot.idle{animation:none;background:var(--green)}
.dot.err{animation:none;background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* ── SKELETON ── */
.skeleton-wrap{padding:20px 20px 0;max-width:1100px;margin:0 auto}
.skel-hd{height:40px;width:260px;margin-bottom:20px;
  background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
  background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite}
.skel-tab{height:46px;margin-bottom:6px;
  background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
  background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite}
.skel-band{height:36px;margin-bottom:4px;
  background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
  background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite}
.skel-row{height:80px;margin-bottom:3px;
  background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
  background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── PAGE HEADER ── */
#page-header{display:none;max-width:1100px;margin:0 auto;padding:24px 20px 0;position:relative;z-index:1}
.pg-date{font-size:26px;font-weight:800;letter-spacing:.02em;color:#fff}
.pg-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px}
.pg-actions{display:flex;align-items:center;gap:10px;margin-top:16px}
.btn-red{font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  background:transparent;border:1px solid var(--red);color:var(--red);padding:7px 16px;cursor:pointer;
  transition:background .15s,color .15s;border-radius:2px}
.btn-red:hover{background:var(--red);color:#fff}
.btn-red:disabled{opacity:.3;cursor:not-allowed}
.date-nav{display:flex;align-items:center;gap:8px;margin-top:18px}
.btn-nav{font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:.06em;
  background:var(--surface2);border:1px solid var(--border2);color:var(--text);
  padding:7px 18px;cursor:pointer;border-radius:2px;transition:all .15s;display:flex;align-items:center;gap:6px}
.btn-nav:hover:not(:disabled){background:var(--accent);border-color:var(--accent);color:#000}
.btn-nav:disabled{opacity:.25;cursor:not-allowed}
.btn-nav .arrow{font-size:16px;line-height:1}
.date-nav-counter{font-family:var(--mono);font-size:11px;color:var(--muted);padding:0 6px}

/* ── TABS ── */
.tabs-wrap{position:sticky;top:58px;z-index:90;background:rgba(8,11,15,.97);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:0 20px;overflow-x:auto;display:none}
.tabs-wrap::-webkit-scrollbar{height:0}
.tab-btn{font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  background:none;border:none;color:var(--text-dim);padding:14px 18px;cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:#fff;border-bottom-color:var(--accent)}
.tab-count{display:inline-block;font-family:var(--mono);font-size:10px;background:var(--surface2);
  border:1px solid var(--border2);color:var(--text-dim);padding:1px 6px;border-radius:10px;margin-left:6px;vertical-align:middle}
.tab-btn.active .tab-count{color:var(--accent)}

/* ── MAIN ── */
main{max-width:1100px;margin:0 auto;padding:20px 20px 80px;position:relative;z-index:1}

/* ── ODDS BAND SECTION ── */
.odds-section{margin-bottom:28px}
.band-header{
  display:flex;align-items:center;gap:12px;
  padding:9px 14px;margin-bottom:6px;
  border-left:3px solid var(--band-color);
  background:rgba(255,255,255,.02);
}
.band-label{font-size:16px;font-weight:800;letter-spacing:.06em;color:var(--band-color)}
.band-sub{font-family:var(--mono);font-size:10px;color:var(--text-dim)}
.band-sort-val{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-left:auto;opacity:.7}
.band-count{font-family:var(--mono);font-size:10px;font-weight:600;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:var(--text-dim);padding:2px 8px;border-radius:10px;flex-shrink:0}

.band-low  {--band-color:var(--low)}
.band-mid  {--band-color:var(--mid)}
.band-high {--band-color:var(--high)}
.band-xhigh{--band-color:var(--xhigh)}
.band-none {--band-color:var(--muted)}

/* ── MATCH CARD ── */
.match-card{
  background:var(--surface);border:1px solid var(--border);
  margin-bottom:3px;padding:11px 14px 9px;
  transition:border-color .15s,background .15s;
  opacity:0;animation:rise .28s cubic-bezier(.22,1,.36,1) both;overflow:hidden;cursor:pointer;
}
.match-card:hover{background:var(--surface2);border-color:var(--border2)}
.match-card.removing{
  animation:none !important;
  transition:max-height .28s ease,opacity .22s ease,padding .28s ease,margin .28s ease !important;
  max-height:0 !important;opacity:0 !important;
  padding-top:0 !important;padding-bottom:0 !important;
  border-top-width:0 !important;border-bottom-width:0 !important;margin:0 !important
}
@keyframes rise{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* card top row */
.card-top{display:flex;align-items:center;gap:10px}
.card-rank{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--muted);min-width:20px;text-align:center;flex-shrink:0}
.card-rank.gold{color:#ffd700}.card-rank.silver{color:#c0c0c0}.card-rank.bronze{color:#cd7f32}
.card-teams{flex:1;min-width:0}
.card-matchup{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.team-name{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.vs-sep{font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0}
.card-meta{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-top:2px}
.card-odds-pill{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 9px;border-radius:3px;
  flex-shrink:0;white-space:nowrap;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text-dim)}
.card-odds-pill.has-odds{background:rgba(255,255,255,.08);color:#fff;border-color:rgba(255,255,255,.2)}
.del-btn{width:28px;height:28px;border-radius:2px;background:none;border:1px solid transparent;
  color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:color .15s,border-color .15s,background .15s;flex-shrink:0}
.del-btn:hover{color:var(--red);border-color:rgba(255,23,68,.5);background:rgba(255,23,68,.07)}

/* stats row */
.card-stats{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.stat-chip{display:flex;flex-direction:column;align-items:center;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:3px;padding:5px 7px;min-width:50px;flex:1}
.stat-val{font-family:var(--mono);font-size:13px;font-weight:600;line-height:1}
.stat-lbl{font-size:8px;color:var(--text-dim);margin-top:2px;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
/* highlight the active metric chip */
.stat-chip.active-metric{border-color:var(--accent);background:rgba(0,229,255,.07)}
.stat-chip.active-metric .stat-val{color:var(--accent)}
.stat-chip.active-metric .stat-lbl{color:rgba(0,229,255,.6)}
/* strength chip */
.stat-chip.str-chip{border-color:rgba(0,229,255,.12);background:rgba(0,229,255,.04)}
.stat-chip.str-chip .stat-val{color:var(--accent)}

.c-hi{color:var(--green)}.c-mid{color:var(--yellow)}.c-lo{color:var(--orange)}.c-dim{color:var(--text-dim)}
.empty-all{text-align:center;padding:60px 20px;font-family:var(--mono);font-size:12px;color:var(--muted);display:none}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.82);
  backdrop-filter:blur(6px);align-items:center;justify-content:center}
.overlay.open{display:flex;animation:fadeIn .18s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border2);padding:32px 36px;
  max-width:360px;width:92%;text-align:center;animation:scaleIn .2s cubic-bezier(.22,1,.36,1) both}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal h2{font-size:16px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--red);margin-bottom:8px}
.modal p{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-bottom:22px;line-height:1.7}
.modal-btns{display:flex;gap:10px;justify-content:center}
.btn-cancel{font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  background:none;border:1px solid var(--border2);color:var(--text-dim);padding:8px 16px;cursor:pointer;
  transition:color .15s,border-color .15s}
.btn-cancel:hover{color:var(--text);border-color:var(--text)}

@media(max-width:580px){
  .team-name{max-width:100px}
  .stat-chip{min-width:40px;padding:4px 4px}
  .stat-val{font-size:11px}
}
</style>
</head>
<body>

<header>
  <a class="back" href="index.html">Back</a>
  <div class="logo">FP<span>Scout</span></div>
</header>

<div id="status-bar"><div class="dot" id="dot"></div><span id="status-txt">Loading…</span></div>

<div class="skeleton-wrap" id="skeletons">
  <div class="skel-hd"></div>
  <div class="skel-tab"></div>
  <div class="skel-band"></div>
  <div class="skel-row"></div><div class="skel-row"></div>
  <div class="skel-band"></div>
  <div class="skel-row"></div><div class="skel-row"></div><div class="skel-row"></div>
</div>

<div id="page-header">
  <div class="pg-date" id="pg-date"></div>
  <div class="pg-sub" id="pg-sub"></div>
  <div class="pg-actions">
    <button class="btn-red" id="btn-del-date">✕ Delete This Entire Date</button>
  </div>
  <div class="date-nav">
    <button class="btn-nav" id="btn-prev-date" disabled><span class="arrow">‹</span> Prev Date</button>
    <span class="date-nav-counter" id="date-nav-counter"></span>
    <button class="btn-nav" id="btn-next-date" disabled>Next Date <span class="arrow">›</span></button>
  </div>
</div>

<div class="tabs-wrap" id="tabs-wrap">
  <button class="tab-btn active" data-tab="win" >Win %<span    class="tab-count" id="cnt-win" >0</span></button>
  <button class="tab-btn"        data-tab="ov15">OV 1.5<span   class="tab-count" id="cnt-ov15">0</span></button>
  <button class="tab-btn"        data-tab="ov25">OV 2.5<span   class="tab-count" id="cnt-ov25">0</span></button>
  <button class="tab-btn"        data-tab="ov35">OV 3.5<span   class="tab-count" id="cnt-ov35">0</span></button>
  <button class="tab-btn"        data-tab="btts">BTTS<span     class="tab-count" id="cnt-btts">0</span></button>
  <button class="tab-btn"        data-tab="ts1" >Score ≥1<span class="tab-count" id="cnt-ts1" >0</span></button>
  <button class="tab-btn"        data-tab="ts2" >Score 2+<span class="tab-count" id="cnt-ts2" >0</span></button>
</div>

<main id="main" style="display:none">
  <div id="bands-wrap"></div>
  <div class="empty-all" id="empty-all">No predictions for this date.</div>
</main>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title">Confirm Delete</h2>
    <p id="modal-body">This cannot be undone.</p>
    <div class="modal-btns">
      <button class="btn-cancel" id="btn-modal-cancel">Cancel</button>
      <button class="btn-red"    id="btn-modal-confirm">Delete</button>
    </div>
  </div>
</div>

<script>
"use strict";

const STAGGER = 22;

/* ── Tab definitions ── */
const TABS = {
  win:  { label:'Win %',    metric: r => Math.max(r.team_a_strength||0, r.team_b_strength||0), chipKey:'win'   },
  ov15: { label:'OV 1.5',   metric: r => r.over_1_5||0,                                        chipKey:'ov15'  },
  ov25: { label:'OV 2.5',   metric: r => r.over_2_5||0,                                        chipKey:'ov25'  },
  ov35: { label:'OV 3.5',   metric: r => r.over_3_5||0,                                        chipKey:'ov35'  },
  btts: { label:'BTTS',     metric: r => r.btts||0,                                             chipKey:'btts'  },
  ts1:  { label:'Score ≥1', metric: r => Math.max(r.team_a_to_score||0,  r.team_b_to_score||0),  chipKey:'ts1' },
  ts2:  { label:'Score 2+', metric: r => Math.max(r.team_a_to_score_2||0,r.team_b_to_score_2||0),chipKey:'ts2' },
};

const BAND_ORDER = ['low','mid','high','xhigh','none'];
const BAND_META  = {
  low:   { label:'1.30 – 1.50', cls:'band-low',   desc:'Strong Favourites'   },
  mid:   { label:'1.50 – 1.80', cls:'band-mid',   desc:'Moderate Favourites' },
  high:  { label:'1.80 – 2.20', cls:'band-high',  desc:'Slight Favourites'   },
  xhigh: { label:'2.20+',       cls:'band-xhigh', desc:'Open Fixtures'       },
  none:  { label:'No Odds',     cls:'band-none',  desc:'Odds unavailable'    },
};

let activeTab = 'win';
let dateStr   = null;
let allDates  = [];
const pool    = {};   // { [pushKey]: record }

/* ── Helpers ── */
const esc    = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function cls(v){ if(v==null||isNaN(v))return'c-dim'; if(v>=70)return'c-hi'; if(v>=50)return'c-mid'; if(v>=35)return'c-lo'; return'c-dim'; }
function fmt(v){ return(v!=null&&!isNaN(v))?Number(v).toFixed(1)+'%':'—'; }
function fmtOdds(v){ const n=parseFloat(v); return(!n||isNaN(n))?'—':n.toFixed(2); }

function oddsBand(r){
  const v = parseFloat(r && r.odds && r.odds.home);
  if(!v || isNaN(v) || v < 1.05) return 'none';
  if(v < 1.50) return 'low';
  if(v < 1.80) return 'mid';
  if(v < 2.20) return 'high';
  return 'xhigh';
}

function rankCls(i){
  return i===0?'card-rank gold':i===1?'card-rank silver':i===2?'card-rank bronze':'card-rank';
}

/* ── Build one full-stats card, highlighting the active metric chip ── */
function makeCard(key, r, rank, delay, tab){
  const sa  = r.team_a_strength||0, sb = r.team_b_strength||0;
  const ho  = fmtOdds(r.odds && r.odds.home);
  const do_ = fmtOdds(r.odds && r.odds.draw);
  const ao  = fmtOdds(r.odds && r.odds.away);
  const ts1 = Math.max(r.team_a_to_score||0,  r.team_b_to_score||0);
  const ts2 = Math.max(r.team_a_to_score_2||0, r.team_b_to_score_2||0);
  const ck  = TABS[tab].chipKey;

  /* which team is more likely to score for TS */
  const ts1Team = (r.team_a_to_score||0) >= (r.team_b_to_score||0)  ? r.team_a : r.team_b;
  const ts2Team = (r.team_a_to_score_2||0) >= (r.team_b_to_score_2||0) ? r.team_a : r.team_b;

  function chip(chipId, val, label, extra){
    const isActive = chipId === ck;
    const cls2 = isActive ? 'stat-chip active-metric' : (extra||'stat-chip');
    const valCls = isActive ? '' : cls(val);
    const sublabel = chipId==='ts1' ? `<div style="font-size:7px;color:rgba(0,229,255,.5);margin-top:1px">${esc(ts1Team)}</div>` :
                     chipId==='ts2' ? `<div style="font-size:7px;color:rgba(0,229,255,.5);margin-top:1px">${esc(ts2Team)}</div>` : '';
    return `<div class="${cls2}"><div class="stat-val ${valCls}">${fmt(val)}</div><div class="stat-lbl">${label}</div>${sublabel}</div>`;
  }

  const el = document.createElement('div');
  el.className = 'match-card';
  el.style.animationDelay = delay + 'ms';
  el.dataset.key = key;

  el.innerHTML =
    `<div class="card-top">`+
      `<div class="${rankCls(rank)}">${rank+1}</div>`+
      `<div class="card-teams">`+
        `<div class="card-matchup">`+
          `<span class="team-name" title="${esc(r.team_a)}">${esc(r.team_a)}</span>`+
          `<span class="vs-sep">vs</span>`+
          `<span class="team-name" title="${esc(r.team_b)}">${esc(r.team_b)}</span>`+
        `</div>`+
        `<div class="card-meta">`+
          (r.league?esc(r.league):'')+
          (r.time?`  ·  ${esc(r.time)}`:'')+
        `</div>`+
      `</div>`+
      `<div class="card-odds-pill${ho!=='—'?' has-odds':''}" title="Home | Draw | Away">`+
        `${ho} <span style="opacity:.4">|</span> ${do_} <span style="opacity:.4">|</span> ${ao}`+
      `</div>`+
      `<button class="del-btn" data-del="1" title="Delete">✕</button>`+
    `</div>`+
    `<div class="card-stats">`+
      `<div class="stat-chip str-chip"><div class="stat-val">${sa.toFixed(1)}%</div><div class="stat-lbl">${esc(r.team_a||'A')}</div></div>`+
      `<div class="stat-chip str-chip"><div class="stat-val">${sb.toFixed(1)}%</div><div class="stat-lbl">${esc(r.team_b||'B')}</div></div>`+
      chip('ov15', r.over_1_5,  'OV 1.5')+
      chip('ov25', r.over_2_5,  'OV 2.5')+
      chip('ov35', r.over_3_5,  'OV 3.5')+
      chip('btts', r.btts,      'BTTS')+
      chip('ts1',  ts1,         'Score ≥1')+
      chip('ts2',  ts2,         'Score 2+')+
    `</div>`;

  el.addEventListener('click', e => {
    if(e.target.closest('[data-del]')) return;
    location.href = `match.html?date=${encodeURIComponent(dateStr)}&key=${encodeURIComponent(key)}`;
  });
  el.querySelector('[data-del]').addEventListener('click', e => {
    e.stopPropagation();
    confirmDelete({
      title: 'Delete Match',
      body: `Remove ${esc(r.team_a)} vs ${esc(r.team_b)}?`,
      onConfirm: () => deleteEntry(key)
    });
  });
  return el;
}

/* ── Render all bands for the active tab ── */
function renderBands(){
  const tab    = activeTab;
  const metric = TABS[tab].metric;
  const wrap   = document.getElementById('bands-wrap');
  wrap.innerHTML = '';

  /* bucket entries by odds band */
  const buckets = {low:[],mid:[],high:[],xhigh:[],none:[]};
  Object.entries(pool).forEach(([key,r]) => buckets[oddsBand(r)].push([key,r]));

  /* sort each bucket by the active metric descending */
  const byMetric = (a,b) => metric(b[1]) - metric(a[1]);

  let totalCards  = 0;
  let globalDelay = 0;

  BAND_ORDER.forEach(band => {
    const entries = buckets[band].sort(byMetric);
    if(!entries.length) return;
    totalCards += entries.length;

    const meta    = BAND_META[band];
    const topVal  = fmt(metric(entries[0][1]));  // best metric value in this band

    const section = document.createElement('div');
    section.className = 'odds-section';
    section.innerHTML =
      `<div class="band-header ${meta.cls}">`+
        `<div class="band-label">${meta.label}</div>`+
        `<div class="band-sub">${meta.desc}</div>`+
        `<div class="band-sort-val">Top ${TABS[tab].label}: ${topVal}</div>`+
        `<div class="band-count">${entries.length}</div>`+
      `</div>`;

    const list = document.createElement('div');
    entries.forEach(([key,r], i) => {
      list.appendChild(makeCard(key, r, i, globalDelay, tab));
      globalDelay += STAGGER;
    });
    section.appendChild(list);
    wrap.appendChild(section);
  });

  /* update tab counts (all tabs share the same pool) */
  Object.keys(TABS).forEach(t => {
    document.getElementById('cnt-'+t).textContent = Object.keys(pool).length;
  });

  document.getElementById('empty-all').style.display = totalCards===0 ? 'block' : 'none';
  const n = Object.keys(pool).length;
  document.getElementById('pg-sub').textContent = n + ' prediction' + (n===1?'':'s');
}

/* ── Tab switching ── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === activeTab));
    renderBands();
    window.scrollTo({top: document.getElementById('main').offsetTop - 70, behavior:'smooth'});
  });
});

/* ── Delete single entry ── */
async function deleteEntry(key){
  document.querySelectorAll(`[data-key="${CSS.escape(key)}"]`).forEach(el=>el.classList.add('removing'));
  await new Promise(r=>setTimeout(r,300));
  delete pool[key];
  try{ await apiDelete(`/${dateStr}/${key}`); }catch(e){console.error(e);}
  if(Object.keys(pool).length===0){
    await apiDelete(`/${dateStr}`).catch(()=>{});
    location.href='index.html';
    return;
  }
  renderBands();
}

async function deleteDateNode(){
  try{ await apiDelete(`/${dateStr}`); }catch(e){console.error(e);}
  location.href='index.html';
}

async function apiDelete(path){
  const res=await fetch(`/api/predictions${path}`,{method:'DELETE'});
  if(!res.ok) throw new Error('Delete '+res.status);
}

/* ── Modal ── */
let _pending = null;
function confirmDelete({title,body,onConfirm}){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').textContent=body;
  _pending=onConfirm;
  document.getElementById('overlay').classList.add('open');
}
document.getElementById('btn-modal-cancel').addEventListener('click',()=>{
  document.getElementById('overlay').classList.remove('open'); _pending=null;
});
document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('overlay')){
    document.getElementById('overlay').classList.remove('open'); _pending=null;
  }
});
document.getElementById('btn-modal-confirm').addEventListener('click',async()=>{
  const fn=_pending; _pending=null;
  document.getElementById('overlay').classList.remove('open');
  if(fn) await fn();
});
document.getElementById('btn-del-date').addEventListener('click',()=>{
  confirmDelete({
    title:'Delete Entire Date',
    body:`Remove all predictions for ${dateStr}? This cannot be undone.`,
    onConfirm:deleteDateNode
  });
});

function setStatus(msg,state){
  document.getElementById('status-txt').textContent=msg;
  document.getElementById('dot').className='dot'+(state?' '+state:'');
}

/* ── Date nav ── */
function goToDate(d){ location.href=`date.html?date=${encodeURIComponent(d)}`; }
function updateDateNav(){
  const idx=allDates.indexOf(dateStr), total=allDates.length;
  const btnPrev=document.getElementById('btn-prev-date');
  const btnNext=document.getElementById('btn-next-date');
  const counter=document.getElementById('date-nav-counter');
  if(total<=1){btnPrev.disabled=true;btnNext.disabled=true;counter.textContent='';return;}
  btnPrev.disabled=idx<=0; btnNext.disabled=idx>=total-1;
  counter.textContent=`${idx+1} of ${total}`;
  btnPrev.onclick=idx>0?()=>goToDate(allDates[idx-1]):null;
  btnNext.onclick=idx<total-1?()=>goToDate(allDates[idx+1]):null;
}
async function loadAllDates(){
  try{
    const res=await fetch('/api/predictions');
    if(!res.ok)return;
    const data=await res.json();
    if(data&&typeof data==='object')
      allDates=Object.keys(data).filter(d=>d&&d.match(/\d{4}-\d{2}-\d{2}/)).sort();
  }catch(e){}
  updateDateNav();
}

/* ── Init ── */
async function init(){
  const params=new URLSearchParams(location.search);
  dateStr=params.get('date');
  if(!dateStr){
    document.getElementById('skeletons').style.display='none';
    setStatus('No date specified.','err');
    return;
  }
  loadAllDates();
  try{
    const res=await fetch(`/api/predictions/${dateStr}`);
    if(!res.ok) throw new Error('API '+res.status);
    const data=await res.json();

    document.getElementById('skeletons').style.display='none';

    const dObj=new Date(dateStr+'T00:00:00');
    const dateLabel=isNaN(dObj.getTime())
      ? dateStr
      : dObj.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

    document.title=`FP Scout — ${dateLabel}`;
    document.getElementById('pg-date').textContent=dateLabel;

    if(data&&typeof data==='object')
      Object.entries(data).forEach(([key,r])=>{ if(r&&r.team_a) pool[key]=r; });

    document.getElementById('page-header').style.display='block';
    document.getElementById('tabs-wrap').style.display='flex';
    document.getElementById('main').style.display='';

    renderBands();

    const n=Object.keys(pool).length;
    setStatus(`${n} prediction${n===1?'':'s'} for ${dateLabel}.`,'idle');
  }catch(err){
    document.getElementById('skeletons').style.display='none';
    setStatus('Error: '+err.message,'err');
    console.error(err);
  }
}

init();
</script>
