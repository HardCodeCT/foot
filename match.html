<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FP Scout — Match</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b0f;--surface:#0f1318;--surface2:#161c24;
  --border:#1c2330;--border2:#243040;
  --accent:#00e5ff;--green:#00e676;--yellow:#ffe600;--orange:#ff6d00;--red:#ff1744;
  --muted:#3d4a5c;--text:#c8d4e8;--text-dim:#5a6a80;
  --font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:.4}

header{
  position:sticky;top:0;z-index:100;
  background:rgba(8,11,15,.94);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 20px;height:58px;
  display:flex;align-items:center;gap:14px
}
.back{
  display:flex;align-items:center;gap:6px;
  font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text-dim);text-decoration:none;transition:color .15s
}
.back::before{content:'‹';font-size:18px}
.back:hover{color:var(--accent)}
.logo{font-size:18px;font-weight:800;letter-spacing:.06em;color:#fff;margin-left:auto}
.logo span{color:var(--accent)}

main{max-width:820px;margin:0 auto;padding:28px 20px 80px;position:relative;z-index:1}

/* loading */
#loading{text-align:center;padding:80px 0}
.spin{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 18px}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-family:var(--mono);font-size:12px;color:var(--muted)}

/* error state */
#error-state{display:none;text-align:center;padding:60px 20px}
.err-icon{font-size:36px;margin-bottom:16px}
.err-title{font-size:16px;font-weight:800;color:var(--red);margin-bottom:8px}
.err-msg{font-family:var(--mono);font-size:11px;color:var(--muted)}

/* detail */
#detail{display:none}

/* vs header */
.vs-block{
  display:grid;grid-template-columns:1fr auto 1fr;
  gap:20px;align-items:center;margin-bottom:32px;
  animation:up .3s ease both
}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.team-col{display:flex;flex-direction:column;gap:6px}
.team-col.right{text-align:right;align-items:flex-end}
.t-label{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.t-name{font-size:24px;font-weight:800;line-height:1.1;color:#fff}
.t-pct{font-family:var(--mono);font-size:34px;font-weight:600;line-height:1}
.vs-mid{display:flex;flex-direction:column;align-items:center;gap:4px}
.vs-txt{font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--muted)}
.vs-date{font-family:var(--mono);font-size:10px;color:var(--text-dim)}
.vs-time{font-family:var(--mono);font-size:11px;color:var(--accent);margin-top:2px}

/* strength bar */
.bar-wrap{margin-bottom:30px;animation:up .3s ease .04s both}
.bar-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-bottom:5px}
.bar-track{height:5px;background:var(--border);position:relative;border-radius:2px}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));transition:width .7s cubic-bezier(.4,0,.2,1);border-radius:2px}

/* section */
.section{margin-bottom:26px;animation:up .3s ease .08s both}
.sec-title{
  font-family:var(--mono);font-size:10px;font-weight:600;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);border-bottom:1px solid var(--border);
  padding-bottom:7px;margin-bottom:12px;
  display:flex;align-items:center;gap:8px
}
.sec-badge{
  font-family:var(--mono);font-size:9px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  padding:2px 7px;border-radius:10px;
  background:rgba(0,229,255,.12);color:var(--accent);border:1px solid rgba(0,229,255,.2)
}

/* metric grid */
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.m-card{background:var(--surface);border:1px solid var(--border);padding:16px 12px;text-align:center;border-radius:2px}
.m-label{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.m-val{font-family:var(--mono);font-size:26px;font-weight:600;line-height:1}
.m-bar{height:3px;background:var(--border);margin-top:8px;border-radius:1px}
.m-bar-fill{height:100%;background:var(--accent);transition:width .6s ease;border-radius:1px}

/* scoring probabilities */
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.score-card{
  background:var(--surface);border:1px solid var(--border);
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  border-radius:2px
}
.score-team{font-size:13px;font-weight:700;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:12px}
.score-vals{display:flex;gap:14px;flex-shrink:0}
.score-item{text-align:center}
.score-pct{font-family:var(--mono);font-size:18px;font-weight:600;line-height:1}
.score-lbl{font-family:var(--mono);font-size:9px;color:var(--text-dim);margin-top:2px}

/* xg row */
.xg-row{
  background:var(--surface);border:1px solid var(--border);
  padding:14px 18px;display:flex;align-items:center;justify-content:space-between;
  border-radius:2px
}
.xg-label{font-size:13px;font-weight:700;color:var(--muted)}
.xg-val{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--accent)}

/* confidence */
.conf-row{
  background:var(--surface);border:1px solid var(--border);
  padding:12px 18px;display:flex;align-items:center;justify-content:space-between;margin-top:8px;
  border-radius:2px
}
.conf-label{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.conf-val{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--text-dim)}

/* ── H2H SOURCE LINK ── */
.src-link{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--border);
  padding:13px 16px;text-decoration:none;color:var(--text);
  transition:background .15s,border-color .15s;border-radius:2px
}
.src-link:hover{background:var(--surface2);border-color:var(--accent)}
.src-badge{
  font-family:var(--mono);font-size:10px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  padding:3px 8px;flex-shrink:0;border-radius:2px
}
.b-fore{background:#200e0e;color:var(--orange);border:1px solid #301616}
.src-name{font-size:13px;font-weight:700;flex-shrink:0}
.src-url{font-family:var(--mono);font-size:10px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;padding:0 10px}
.src-ext{margin-left:auto;color:var(--muted);font-size:16px;flex-shrink:0}
.no-src{
  font-family:var(--mono);font-size:11px;color:var(--muted);
  padding:14px;border:1px dashed var(--border);text-align:center;border-radius:2px
}

/* ── H2H HISTORY TABLE ── */
.h2h-loading{
  display:flex;align-items:center;gap:10px;
  font-family:var(--mono);font-size:11px;color:var(--muted);
  padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:2px
}
.h2h-spin{
  width:14px;height:14px;flex-shrink:0;
  border:2px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite
}
.h2h-none{
  font-family:var(--mono);font-size:11px;color:var(--text-dim);
  padding:14px 16px;background:var(--surface);border:1px dashed var(--border);
  border-radius:2px;text-align:center
}
.h2h-table{width:100%;border-collapse:collapse}
.h2h-table thead th{
  font-family:var(--mono);font-size:9px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  padding:6px 10px;border-bottom:1px solid var(--border);text-align:left
}
.h2h-table thead th.tc{text-align:center}
.h2h-table tbody tr{
  background:var(--surface);border-bottom:1px solid var(--border);
  transition:background .15s
}
.h2h-table tbody tr:hover{background:var(--surface2)}
.h2h-table tbody tr:last-child{border-bottom:none}
.h2h-table tbody td{
  font-family:var(--mono);font-size:11px;color:var(--text);
  padding:9px 10px;vertical-align:middle
}
.h2h-table tbody td.tc{text-align:center}
.h2h-date{color:var(--text-dim);white-space:nowrap}
.h2h-score{
  font-family:var(--mono);font-size:14px;font-weight:600;
  color:#fff;text-align:center;white-space:nowrap
}
.h2h-ht{font-size:10px;color:var(--text-dim);display:block;margin-top:2px}
.h2h-league{color:var(--text-dim);font-size:10px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* winner highlight */
.h2h-table tbody tr.win-a .h2h-home{color:var(--green)}
.h2h-table tbody tr.win-b .h2h-away{color:var(--green)}
.h2h-table tbody tr.draw-r .h2h-home,.h2h-table tbody tr.draw-r .h2h-away{color:var(--yellow)}
.h2h-home{font-weight:600}
.h2h-away{font-weight:600}
/* H2H summary bar */
.h2h-summary{
  display:flex;align-items:center;gap:0;
  background:var(--surface);border:1px solid var(--border);
  border-radius:2px;overflow:hidden;margin-bottom:8px
}
.h2h-sum-col{
  flex:1;text-align:center;padding:10px 8px;
  font-family:var(--mono)
}
.h2h-sum-col.wins-a{border-right:1px solid var(--border)}
.h2h-sum-col.draws{border-right:1px solid var(--border)}
.h2h-sum-num{font-size:22px;font-weight:600;line-height:1}
.h2h-sum-lbl{font-size:9px;color:var(--text-dim);margin-top:3px;letter-spacing:.08em;text-transform:uppercase}
.h2h-sum-col.wins-a .h2h-sum-num{color:var(--green)}
.h2h-sum-col.wins-b .h2h-sum-num{color:var(--orange)}
.h2h-sum-col.draws .h2h-sum-num{color:var(--yellow)}

/* actions */
.actions{display:flex;gap:10px;margin-top:36px;animation:up .3s ease .12s both;flex-wrap:wrap}
.btn-back-link{
  font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  background:none;border:1px solid var(--border2);color:var(--text-dim);
  padding:12px 24px;text-decoration:none;display:inline-flex;align-items:center;
  transition:color .15s,border-color .15s;border-radius:2px
}
.btn-back-link:hover{color:var(--text);border-color:var(--text)}
.btn-del{
  font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  background:none;border:1px solid var(--red);color:var(--red);
  padding:12px 24px;cursor:pointer;transition:background .15s,color .15s;border-radius:2px
}
.btn-del:hover{background:var(--red);color:#fff}
.btn-del:disabled{opacity:.3;cursor:not-allowed}

/* modal */
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.8);
  backdrop-filter:blur(6px);align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);padding:34px 38px;max-width:360px;width:92%;text-align:center}
.modal h2{font-size:17px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--red);margin-bottom:10px}
.modal p{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-bottom:24px;line-height:1.7}
.modal-btns{display:flex;gap:10px;justify-content:center}
.btn-cancel{font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  background:none;border:1px solid var(--border2);color:var(--text-dim);padding:8px 16px;cursor:pointer;
  transition:color .15s,border-color .15s}
.btn-cancel:hover{color:var(--text);border-color:var(--text)}

.c-hi{color:var(--green)}.c-mid{color:var(--yellow)}.c-lo{color:var(--orange)}.c-dim{color:var(--text-dim)}

@media(max-width:580px){
  .vs-block{grid-template-columns:1fr auto 1fr}
  .t-name{font-size:17px}.t-pct{font-size:24px}
  .metric-grid{grid-template-columns:repeat(2,1fr)}
  .score-grid{grid-template-columns:1fr}
  .h2h-league{display:none}
  .actions{flex-direction:column}
}
</style>
</head>
<body>

<header>
  <a class="back" id="back-link" href="index.html">Back</a>
  <div class="logo">FP<span>Scout</span></div>
</header>

<main>
  <div id="loading"><div class="spin"></div><p>Loading match data…</p></div>
  <div id="error-state">
    <div class="err-icon">⚠</div>
    <div class="err-title">Could not load match</div>
    <div class="err-msg" id="err-msg">Unknown error.</div>
  </div>
  <div id="detail">

    <div class="vs-block" id="vs-block"></div>

    <div class="bar-wrap">
      <div class="bar-labels"><span id="bl-a">—</span><span>STRENGTH SPLIT</span><span id="bl-b">—</span></div>
      <div class="bar-track"><div class="bar-fill" id="bar-fill" style="width:50%"></div></div>
    </div>

    <!-- Prediction metrics -->
    <div class="section">
      <div class="sec-title">Prediction Metrics</div>
      <div class="metric-grid" id="metric-grid"></div>
    </div>

    <!-- Scoring probabilities (TS1 / TS2) -->
    <div class="section" id="scoring-section"></div>

    <!-- xG + confidence -->
    <div class="section" id="xg-section"></div>

    <!-- ── Validation Sources (forebet link) ── -->
    <div class="section">
      <div class="sec-title">Validation Sources</div>
      <div id="links-list"></div>
    </div>

    <!-- ── H2H History ── -->
    <div class="section" id="h2h-section" style="display:none">
      <div class="sec-title">
        Head-to-Head History
        <span class="sec-badge" id="h2h-badge"></span>
      </div>
      <!-- summary counts -->
      <div class="h2h-summary" id="h2h-summary" style="display:none"></div>
      <!-- loading spinner -->
      <div class="h2h-loading" id="h2h-loading">
        <div class="h2h-spin"></div>
        <span>Fetching H2H records…</span>
      </div>
      <!-- result area -->
      <div id="h2h-result"></div>
    </div>

    <div class="actions">
      <a class="btn-back-link" id="all-link" href="index.html">← All Fixtures</a>
      <button class="btn-del" id="btn-del">Delete Record</button>
    </div>

  </div>
</main>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Delete Record</h2>
    <p id="modal-body">Permanently remove this prediction from Firebase.</p>
    <div class="modal-btns">
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
      <button class="btn-del" id="btn-confirm">Delete</button>
    </div>
  </div>
</div>

<script>
"use strict";

const params    = new URLSearchParams(location.search);
const matchDate = params.get('date');
const matchKey  = params.get('key');

// Back link goes to the date view if we have a date
if (matchDate) {
  document.getElementById('back-link').href = `date.html?date=${encodeURIComponent(matchDate)}`;
  document.getElementById('all-link').href  = `date.html?date=${encodeURIComponent(matchDate)}`;
}

/* ── helpers ── */
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function cls(v){ if(v==null||isNaN(v))return'c-dim'; if(v>=70)return'c-hi'; if(v>=50)return'c-mid'; if(v>=35)return'c-lo'; return'c-dim'; }
function fmt(v){ return v!=null && !isNaN(v) ? Number(v).toFixed(1)+'%' : '—'; }

/* Firebase-key-safe: mirror of Python's _fb_safe() — replaces . # $ [ ] / */
function fbSafe(s){ return String(s||'').replace(/[.#$[\]/]/g,'_'); }
function pairKey(home, away){ return fbSafe(home + '__vs__' + away); }

/* ── API calls ── */
async function fetchRecord(){
  const res = await fetch(`/api/predictions/${matchDate}/${matchKey}`);
  if(!res.ok) throw new Error('API ' + res.status);
  return res.json();
}
async function fetchH2H(key){
  const res = await fetch(`/api/h2h/${matchDate}/${key}`);
  if(!res.ok) return null;
  return res.json();
}
async function deleteRecord(){
  const res = await fetch(`/api/predictions/${matchDate}/${matchKey}`, {method:'DELETE'});
  if(!res.ok) throw new Error('Delete failed: ' + res.status);
}

/* ── Parse score "2-1" → {h, a} ── */
function parseScore(s){
  const m = String(s||'').match(/(\d+)\s*[-:]\s*(\d+)/);
  return m ? {h:+m[1], a:+m[2]} : null;
}

/* ── Render H2H match history ── */
function renderH2H(data, teamA, teamB){
  const loadEl   = document.getElementById('h2h-loading');
  const resultEl = document.getElementById('h2h-result');
  const badgeEl  = document.getElementById('h2h-badge');
  const summaryEl= document.getElementById('h2h-summary');
  const section  = document.getElementById('h2h-section');

  loadEl.style.display = 'none';

  if(!data || !data.matches || !data.matches.length){
    resultEl.innerHTML = '<div class="h2h-none">No H2H records found for this match.</div>';
    badgeEl.textContent = '0 matches';
    section.style.display = 'block';
    return;
  }

  const matches = data.matches;
  badgeEl.textContent = matches.length + ' match' + (matches.length===1?'':'es');

  // Count wins — compare names case-insensitively to prediction team names
  const normA = teamA.toLowerCase().trim();
  const normB = teamB.toLowerCase().trim();

  let winsA=0, winsB=0, draws=0;
  const rows = matches.map(m => {
    const sc  = parseScore(m.score);
    let rowCls = '';
    if(sc){
      if(sc.h > sc.a){
        // home won — check if home is team_a
        const homeIsA = m.home.toLowerCase().trim().includes(normA.split(' ')[0]) ||
                        normA.includes(m.home.toLowerCase().trim().split(' ')[0]);
        if(homeIsA){ winsA++; rowCls='win-a'; } else { winsB++; rowCls='win-b'; }
      } else if(sc.a > sc.h){
        // away won
        const awayIsA = m.away.toLowerCase().trim().includes(normA.split(' ')[0]) ||
                        normA.includes(m.away.toLowerCase().trim().split(' ')[0]);
        if(awayIsA){ winsA++; rowCls='win-a'; } else { winsB++; rowCls='win-b'; }
      } else {
        draws++; rowCls='draw-r';
      }
    }
    return `<tr class="${rowCls}">
      <td class="h2h-date">${esc(m.date)}</td>
      <td class="h2h-home">${esc(m.home)}</td>
      <td class="h2h-score tc">
        <span class="h2h-score">${esc(m.score)}</span>
        ${m.ht ? `<span class="h2h-ht">(${esc(m.ht)})</span>` : ''}
      </td>
      <td class="h2h-away">${esc(m.away)}</td>
      <td class="h2h-league">${esc(m.league||'')}</td>
    </tr>`;
  });

  // Summary bar
  summaryEl.innerHTML =
    `<div class="h2h-sum-col wins-a"><div class="h2h-sum-num">${winsA}</div><div class="h2h-sum-lbl">${esc(teamA)} wins</div></div>`+
    `<div class="h2h-sum-col draws"><div class="h2h-sum-num">${draws}</div><div class="h2h-sum-lbl">Draws</div></div>`+
    `<div class="h2h-sum-col wins-b"><div class="h2h-sum-num">${winsB}</div><div class="h2h-sum-lbl">${esc(teamB)} wins</div></div>`;
  summaryEl.style.display = 'flex';

  resultEl.innerHTML =
    `<table class="h2h-table">
      <thead><tr>
        <th>Date</th><th>Home</th><th class="tc">Score</th><th>Away</th><th class="h2h-league">League</th>
      </tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table>`;

  section.style.display = 'block';
}

/* ── Main render ── */
function render(r){
  const a = r.team_a_strength||0;
  const b = r.team_b_strength||0;

  // VS header
  document.getElementById('vs-block').innerHTML=`
    <div class="team-col">
      <div class="t-label">Home / Team A</div>
      <div class="t-name">${esc(r.team_a)}</div>
      <div class="t-pct ${cls(a)}">${a.toFixed(1)}<span style="font-size:.45em;opacity:.6">%</span></div>
    </div>
    <div class="vs-mid">
      <div class="vs-txt">VS</div>
      <div class="vs-date">${esc(matchDate)}</div>
      ${r.time ? `<div class="vs-time">${esc(r.time)}</div>` : ''}
    </div>
    <div class="team-col right">
      <div class="t-label">Away / Team B</div>
      <div class="t-name">${esc(r.team_b)}</div>
      <div class="t-pct ${cls(b)}">${b.toFixed(1)}<span style="font-size:.45em;opacity:.6">%</span></div>
    </div>
  `;

  // Strength bar
  document.getElementById('bl-a').textContent = r.team_a;
  document.getElementById('bl-b').textContent = r.team_b;
  setTimeout(()=>{ document.getElementById('bar-fill').style.width = a.toFixed(1)+'%'; }, 80);

  // Metrics grid
  const metrics = [
    {label:'OV 1.5', val:r.over_1_5},
    {label:'OV 2.5', val:r.over_2_5},
    {label:'OV 3.5', val:r.over_3_5},
    {label:'BTTS',   val:r.btts},
  ];
  document.getElementById('metric-grid').innerHTML = metrics.map(({label,val})=>{
    const n = val!=null ? Number(val) : null;
    const w = n!=null ? Math.min(n,100) : 0;
    return `<div class="m-card">
      <div class="m-label">${label}</div>
      <div class="m-val ${cls(n)}">${fmt(n)}</div>
      <div class="m-bar"><div class="m-bar-fill" style="width:${w}%"></div></div>
    </div>`;
  }).join('');

  // Scoring probabilities
  const ts1a = r.team_a_to_score   || 0;
  const ts1b = r.team_b_to_score   || 0;
  const ts2a = r.team_a_to_score_2 || 0;
  const ts2b = r.team_b_to_score_2 || 0;
  if(ts1a||ts1b||ts2a||ts2b){
    document.getElementById('scoring-section').innerHTML=`
      <div class="sec-title">Scoring Probabilities</div>
      <div class="score-grid">
        <div class="score-card">
          <div class="score-team">${esc(r.team_a)}</div>
          <div class="score-vals">
            <div class="score-item"><div class="score-pct ${cls(ts1a)}">${fmt(ts1a)}</div><div class="score-lbl">Score ≥1</div></div>
            <div class="score-item"><div class="score-pct ${cls(ts2a)}">${fmt(ts2a)}</div><div class="score-lbl">Score 2+</div></div>
          </div>
        </div>
        <div class="score-card">
          <div class="score-team">${esc(r.team_b)}</div>
          <div class="score-vals">
            <div class="score-item"><div class="score-pct ${cls(ts1b)}">${fmt(ts1b)}</div><div class="score-lbl">Score ≥1</div></div>
            <div class="score-item"><div class="score-pct ${cls(ts2b)}">${fmt(ts2b)}</div><div class="score-lbl">Score 2+</div></div>
          </div>
        </div>
      </div>`;
  }

  // xG + confidence
  let xgHtml = '';
  if(r.expected_goals!=null){
    xgHtml += `<div class="xg-row"><div class="xg-label">Expected Goals (xG)</div><div class="xg-val">${Number(r.expected_goals).toFixed(2)}</div></div>`;
  }
  if(r.confidence!=null){
    xgHtml += `<div class="conf-row"><div class="conf-label">Model confidence</div><div class="conf-val">${(Number(r.confidence)*100).toFixed(1)}%</div></div>`;
  }
  if(xgHtml){
    document.getElementById('xg-section').innerHTML = `<div class="sec-title">Additional Signals</div>${xgHtml}`;
  }

  // Source link
  const src    = r.sources || {};
  const fbUrl  = src.forebet_h2h || '';
  const llEl   = document.getElementById('links-list');
  if(fbUrl){
    llEl.innerHTML =
      `<a class="src-link" href="${esc(fbUrl)}" target="_blank" rel="noopener noreferrer">
        <span class="src-badge b-fore">Forebet</span>
        <span class="src-name">Forebet H2H</span>
        <span class="src-url">${esc(fbUrl)}</span>
        <span class="src-ext">↗</span>
      </a>`;
  } else {
    llEl.innerHTML = '<div class="no-src">No source link stored for this prediction.</div>';
  }

  document.title = `${r.team_a} vs ${r.team_b} — FP Scout`;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('detail').style.display  = 'block';

  // ── Fetch H2H ──
  // Use stored h2h_key (from updated pipeline.py) if available,
  // otherwise fall back to computing from team names.
  const h2hKey = (src.h2h_key) || pairKey(r.team_a, r.team_b);

  document.getElementById('h2h-section').style.display = 'block';
  fetchH2H(h2hKey).then(data => {
    renderH2H(data, r.team_a, r.team_b);
  }).catch(() => {
    // silent fail — just show the forebet link above
    document.getElementById('h2h-loading').style.display = 'none';
    document.getElementById('h2h-result').innerHTML =
      '<div class="h2h-none">H2H records unavailable. Use the Forebet link above to verify.</div>';
  });
}

/* ── Delete ── */
document.getElementById('btn-del').addEventListener('click', () =>
  document.getElementById('overlay').classList.add('open'));
document.getElementById('btn-cancel').addEventListener('click', () =>
  document.getElementById('overlay').classList.remove('open'));
document.getElementById('overlay').addEventListener('click', e => {
  if(e.target===document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
});
document.getElementById('btn-confirm').addEventListener('click', async () => {
  const btn = document.getElementById('btn-confirm');
  btn.disabled = true; btn.textContent = 'Deleting…';
  try{
    await deleteRecord();
    window.location.href = matchDate ? `date.html?date=${encodeURIComponent(matchDate)}` : 'index.html';
  } catch(err){
    alert('Delete failed: ' + err.message);
    btn.disabled = false; btn.textContent = 'Delete';
  }
});

/* ── Init ── */
async function init(){
  if(!matchDate || !matchKey){
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-state').style.display = 'block';
    document.getElementById('err-msg').textContent = 'Missing date or key in URL.';
    return;
  }
  try{
    const r = await fetchRecord();
    if(!r){
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-state').style.display = 'block';
      document.getElementById('err-msg').textContent = 'Record not found — it may have been deleted.';
      return;
    }
    render(r);
  } catch(err){
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-state').style.display = 'block';
    document.getElementById('err-msg').textContent = err.message;
    console.error(err);
  }
}
init();
</script>
</body>
</html>
